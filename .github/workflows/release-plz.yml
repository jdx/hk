name: release-plz

permissions: {}

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - release-plz

concurrency:
  group: release-plz

env:
  DRY_RUN: 0

jobs:
  pending-release:
    if: github.repository == 'jdx/hk'
    runs-on: ubuntu-latest
    outputs:
      has_release_commits: ${{ steps.commits.outputs.has_release_commits }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # zizmor: ignore[artipacked] v6
        with:
          fetch-depth: 0
      - name: Check for fix/feat commits since the latest release
        id: commits
        run: |
          set -euo pipefail

          latest_tag=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -1 || true)
          if [ -n "$latest_tag" ]; then
            range="${latest_tag}..HEAD"
            echo "Checking pending commits since ${latest_tag}"
          else
            range="HEAD"
            echo "No v* release tag found; checking all commits"
          fi

          if git log --format=%s "$range" | grep -Eq '^(fix|feat)(\([^)]+\))?!?: '; then
            echo "has_release_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pending fix/feat commits; skipping autorelease."
            echo "has_release_commits=false" >> "$GITHUB_OUTPUT"
          fi

  release-plz:
    needs: pending-release
    if: github.repository == 'jdx/hk' && needs.pending-release.outputs.has_release_commits == 'true'
    runs-on: namespace-profile-endev-linux-amd64
    permissions:
      contents: write
      pull-requests: write
    steps:
      # release-plz needs persisted credentials so the mise-tasks/release-plz
      # script's `git push --tags` / `git push origin release --force` can
      # authenticate.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # zizmor: ignore[artipacked] v6
        with:
          fetch-depth: 0
          token: ${{ secrets.HK_GH_TOKEN }}
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true
          cache: false
      - run: mise trust --all
      - run: mise run release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.HK_GH_TOKEN }}
