[package]
name = "angler"
version = "0.1.0"
edition = "2024"
description = "A tool for managing git hooks"
license = "MIT"
repository = "https://github.com/jdx/angler"
documentation = "https://angler.jdx.dev"
homepage = "https://angler.jdx.dev"

[dependencies]
chrono = "0.4"
clap = { version = "4", features = ["derive"] }
console = "0.15"
dirs = "6"
ensembler = "0.1.0"
extism = "1"
git2 = "0.20"
globset = "0.4.15"
indexmap = "2.7.1"
itertools = "0.14"
log = "0.4"
miette = { version = "7", features = ["fancy", "syntect-highlighter"] }
serde = { version = "1", features = ["derive"] }
serde_with = "3.12.0"
tera = "1.20.0"
thiserror = "2.0.11"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
xx = {version="2",features=["http", "hash", "rustls"]}


[features]
default = ["git2/vendored-libgit2"]
